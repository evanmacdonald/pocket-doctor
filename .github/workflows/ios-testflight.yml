name: iOS TestFlight

on:
  workflow_dispatch:

concurrency:
  group: ios-testflight-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & upload to TestFlight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test:ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build + auto-submit to TestFlight
        id: eas
        run: |
          set -o pipefail
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --auto-submit 2>&1 | tee eas-build.log
          BUILD_URL=$(grep -oE 'https://expo\.dev/[^ )]+/builds/[a-f0-9-]+' eas-build.log | head -n1 || true)
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on PR with build link
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.eas.outputs.build_url }}";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `iOS TestFlight build started: ${url}\n\nOnce it finishes uploading, it will appear in TestFlight automatically.`
            });
